spring:
  application:
    name: product-service

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/productstoredb}
      database: productstoredb
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

server:
  port: 8081   # Gateway runs on 8080 and proxies here

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.app: DEBUG
    org.springframework.cache: TRACE
